<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Tau — a Python coding-agent harness inspired by Pi</title>
  <desc id="desc">A decorative README header for Tau with gradient background, layered arcs, and the word tau.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.45" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="20%" r="60%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="70%" r="55%">
      <stop offset="0" stop-color="#c084fc" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tauText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#e0f2fe" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glow1)"/>
  <rect width="1200" height="360" rx="34" fill="url(#glow2)"/>
  <rect width="1200" height="360" rx="34" fill="url(#grid)" opacity="0.8"/>

  <g opacity="0.7" fill="none">
    <path d="M-80 295 C175 110 285 420 540 225 S905 40 1280 175" stroke="#67e8f9" stroke-opacity="0.30" stroke-width="3"/>
    <path d="M-30 88 C160 210 315 32 520 128 S880 320 1240 72" stroke="#c4b5fd" stroke-opacity="0.24" stroke-width="2"/>
    <circle cx="1000" cy="82" r="88" stroke="#a5f3fc" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="1010" cy="82" r="52" stroke="#ddd6fe" stroke-opacity="0.18" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="70" width="1056" height="220" rx="28" fill="#020617" fill-opacity="0.35" stroke="#e0f2fe" stroke-opacity="0.14"/>
    <text x="132" y="178" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="112" font-weight="800" letter-spacing="-6" fill="url(#tauText)">tau</text>
    <text x="134" y="226" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="29" font-weight="600" fill="#cffafe" fill-opacity="0.95">a Python coding-agent harness inspired by Pi</text>
    <text x="134" y="263" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#e2e8f0" fill-opacity="0.82">built to teach how coding agents work — providers, loops, tools, sessions, and frontends</text>
  </g>

  <g transform="translate(844 105)" opacity="0.96">
    <rect x="0" y="0" width="220" height="132" rx="22" fill="#0f172a" fill-opacity="0.74" stroke="#67e8f9" stroke-opacity="0.22"/>
    <circle cx="36" cy="38" r="7" fill="#22d3ee"/>
    <circle cx="62" cy="38" r="7" fill="#a78bfa"/>
    <circle cx="88" cy="38" r="7" fill="#34d399"/>
    <path d="M34 74 L72 96 L34 118" fill="none" stroke="#a5f3fc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M104 116 H172" stroke="#ddd6fe" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
