<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tauGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5e35b1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e57c2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9c27b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a1b9a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="none" />

  <!-- Decorative accent bars -->
  <rect x="10" y="20" width="4" height="80" fill="url(#accentGradient)" rx="2" opacity="0.3" />
  <rect x="386" y="20" width="4" height="80" fill="url(#accentGradient)" rx="2" opacity="0.3" />

  <!-- Tau symbol with style -->
  <g filter="url(#shadow)">
    <!-- Horizontal bar of tau -->
    <rect x="60" y="25" width="110" height="16" rx="8" fill="url(#tauGradient)" />

    <!-- Vertical stem of tau -->
    <rect x="102" y="41" width="26" height="65" rx="13" fill="url(#tauGradient)" />

    <!-- Accent curve -->
    <circle cx="115" cy="40" r="8" fill="url(#accentGradient)" opacity="0.4" />
  </g>

  <!-- Text: "Tau" -->
  <text x="190" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#5e35b1" letter-spacing="-1">Tau</text>

  <!-- Subtitle text -->
  <text x="190" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#7e57c2" letter-spacing="1.5" font-weight="500" opacity="0.8">AGENT HARNESS</text>

  <!-- Subtle design element -->
  <circle cx="380" cy="45" r="2.5" fill="url(#accentGradient)" opacity="0.4" />
  <circle cx="380" cy="75" r="2.5" fill="url(#accentGradient)" opacity="0.4" />
</svg>